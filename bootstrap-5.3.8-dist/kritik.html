<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kritik dan Saran - SMA Negeri 1 Metro</title>

<link rel="stylesheet" href="css/bootstrap.min.css">

<style>

body{
background:#f4f6fb;
font-family:Arial, Helvetica, sans-serif;
}

/* HERO */

.hero{
background:linear-gradient(135deg,#0d6efd,#4e73df);
color:white;
padding:30px 20px;
text-align:center;
}

/* CARD FORM */

.form-card{
border:none;
border-radius:15px;
box-shadow:0 6px 20px rgba(0,0,0,0.1);
}

.form-control{
border-radius:10px;
}

textarea{
resize:none;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand fw-bold">SMA N 1 Metro</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="index.html">Beranda</a>
</li>

<li class="nav-item">
<a class="nav-link" href="profil.html">Profil</a>
</li>

<li class="nav-item">
<a class="nav-link" href="struktur.html">Struktur</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="kritik.html">Kritik & Saran</a>
</li>

<li class="nav-item">
<a class="nav-link" href="login.html">Login</a>
</li>

</ul>

</div>

</div>

</nav>


<!-- HERO -->

<section class="hero">

<div class="container">

<h1>Kritik & Saran</h1>
<p>Berikan masukan terbaik untuk kemajuan SMA Negeri 1 Metro</p>

</div>

</section>


<!-- FORM -->

<section class="container my-5">

<div class="row justify-content-center">

<div class="col-md-7">

<div class="card form-card p-4">

<h4 class="text-center mb-4">Form Kritik dan Saran</h4>

<form id="formSaran">

<div class="mb-3">
<label class="form-label">Nama</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Kategori</label>
<select class="form-control">
<option>Pelayanan Sekolah</option>
<option>Fasilitas</option>
<option>Kegiatan Sekolah</option>
<option>Lainnya</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Pesan</label>
<textarea class="form-control" rows="4" required></textarea>
</div>

<div class="d-grid">
<button class="btn btn-primary btn-lg">
Kirim Kritik & Saran
</button>
</div>

</form>

<div id="alertSukses" class="alert alert-success mt-3 d-none">
Terima kasih! Kritik dan saran Anda telah dikirim.
</div>

</div>

</div>

</div>

</section>


<!-- FOOTER -->

<footer class="bg-dark text-white text-center p-3">

<p>© 2026 Portal SMA Negeri 1 Metro</p>

</footer>


<script src="js/bootstrap.bundle.min.js"></script>

<script>

document.getElementById("formSaran").addEventListener("submit", function(e){

e.preventDefault();

document.getElementById("alertSukses").classList.remove("d-none");

this.reset();

});

</script>

</body>
</html>
